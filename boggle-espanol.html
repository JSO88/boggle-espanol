<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boggle en Español</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --dark: #1A1410;
    --terracotta: #C4522A;
    --terracotta-light: #E8806A;
    --gold: #D4A017;
    --gold-light: #F0C040;
    --green: #2D6A4F;
    --green-light: #52B788;
    --surface: #EDE8DF;
    --surface2: #E0D9CE;
    --text-muted: #6B5E4E;
    --border: rgba(26,20,16,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 80%, rgba(196,82,42,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(212,160,23,0.08) 0%, transparent 50%);
  }

  h1, h2, h3 { font-family: 'Playfair Display', serif; }

  /* ---- LOBBY ---- */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 8vh;
    min-height: 100vh;
    padding-left: 2rem;
    padding-right: 2rem;
    gap: 2rem;
  }

  .logo {
    text-align: center;
  }
  .logo h1 {
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 900;
    color: var(--dark);
    letter-spacing: -2px;
    line-height: 1;
  }
  .logo h1 span { color: var(--terracotta); }
  .logo p {
    font-size: 1rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .lobby-card {
    background: white;
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 40px rgba(26,20,16,0.08);
  }

  .lobby-card h2 {
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
    color: var(--dark);
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .input-group label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .input-group input {
    padding: 0.875rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    background: var(--cream);
    color: var(--dark);
    transition: border-color 0.2s;
    outline: none;
  }
  .input-group input:focus { border-color: var(--terracotta); }

  .btn {
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--terracotta);
    color: white;
  }
  .btn-primary:hover { background: #B3481F; }

  .btn-secondary {
    background: transparent;
    color: var(--terracotta);
    border: 1.5px solid var(--terracotta);
    margin-top: 0.75rem;
  }
  .btn-secondary:hover { background: rgba(196,82,42,0.06); }

  .btn-gold {
    background: var(--gold);
    color: white;
  }
  .btn-gold:hover { background: #B88A0F; }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ---- WAITING ROOM ---- */
  #waiting {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    gap: 1.5rem;
  }

  .room-code-display {
    text-align: center;
  }
  .room-code-display p {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .room-code-display .code {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--terracotta);
    letter-spacing: 8px;
  }

  .players-list {
    background: white;
    border-radius: 16px;
    padding: 1.5rem;
    width: 100%;
    max-width: 380px;
    border: 1px solid var(--border);
  }
  .players-list h3 {
    font-size: 1rem;
    margin-bottom: 1rem;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 0.8rem;
  }

  .player-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
  }
  .player-item:last-child { border-bottom: none; }

  .player-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    color: white;
    flex-shrink: 0;
  }

  .status-badge {
    margin-left: auto;
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    font-weight: 500;
  }
  .status-host {
    background: rgba(196,82,42,0.12);
    color: var(--terracotta);
  }
  .status-ready {
    background: rgba(45,106,79,0.12);
    color: var(--green);
  }

  /* ---- GAME ---- */
  #game {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 1rem;
    gap: 1rem;
    max-width: 520px;
    margin: 0 auto;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    border-radius: 14px;
    padding: 0.75rem 1.25rem;
    border: 1px solid var(--border);
  }

  .timer-display {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--dark);
    min-width: 60px;
    text-align: center;
    transition: color 0.3s;
  }
  .timer-display.urgent { color: var(--terracotta); animation: pulse 0.5s ease-in-out infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  .round-info {
    text-align: center;
  }
  .round-info .round-num {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
  }

  .word-count-display {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.5px;
    min-height: 1rem;
  }

  .btn-restart {
    display: block;
    margin: 4px auto 0;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 0.9rem;
    padding: 1px 8px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.6;
  }
  .btn-restart:hover { border-color: var(--terracotta); color: var(--terracotta); }

  .scores-mini {
    display: flex;
    gap: 1rem;
  }
  .score-chip {
    text-align: right;
  }
  .score-chip .name {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-chip .pts {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--dark);
  }

  /* Board */
  .board-wrap {
    display: flex;
    justify-content: center;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    background: var(--surface2);
    border-radius: 18px;
    padding: 10px;
    border: 1px solid var(--border);
    touch-action: none;
    user-select: none;
    width: 100%;
    max-width: 360px;
    aspect-ratio: 1;
  }

  .tile {
    background: white;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
    position: relative;
    aspect-ratio: 1;
  }

  .tile .letter {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5.5vw, 2.4rem);
    font-weight: 900;
    color: var(--dark);
    line-height: 1;
  }

  .tile .points {
    display: none;
  }

  .tile.selected {
    background: var(--terracotta);
    border-color: #B3481F;
    transform: scale(0.95);
  }
  .tile.selected .letter { color: white; }

  .tile.path {
    background: var(--surface);
    border-color: var(--terracotta-light);
  }

  /* Word input area */
  .word-area {
    background: white;
    border-radius: 14px;
    padding: 1rem 1.25rem;
    border: 1px solid var(--border);
  }

  .current-word {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--dark);
    min-height: 2.5rem;
    text-align: center;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .word-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.75rem;
  }
  .word-actions .btn { width: auto; flex: 1; font-size: 0.9rem; padding: 0.7rem; }

  .found-words {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.75rem;
    max-height: 100px;
    overflow-y: auto;
  }

  .word-tag {
    background: var(--surface);
    border-radius: 100px;
    padding: 0.25rem 0.75rem;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--dark);
    border: 1px solid var(--border);
  }
  .word-tag.valid { background: rgba(45,106,79,0.1); border-color: var(--green-light); color: var(--green); }
  .word-tag.invalid { background: rgba(196,82,42,0.1); border-color: var(--terracotta-light); color: var(--terracotta); text-decoration: line-through; }

  .word-feedback {
    text-align: center;
    font-size: 0.85rem;
    margin-top: 0.4rem;
    min-height: 1.2rem;
    font-weight: 500;
  }
  .word-feedback.ok { color: var(--green); }
  .word-feedback.err { color: var(--terracotta); }

  /* ---- RESULTS ---- */
  #results {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    gap: 1.5rem;
  }

  .results-title {
    text-align: center;
  }
  .results-title h2 {
    font-size: 2.5rem;
    color: var(--dark);
  }
  .results-title .winner-name {
    color: var(--terracotta);
  }

  .results-card {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 460px;
    border: 1px solid var(--border);
  }

  .player-result {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
  }
  .player-result:last-child { border-bottom: none; }

  .result-rank {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--text-muted);
    min-width: 30px;
  }
  .result-rank.first { color: var(--gold); }

  .result-details { flex: 1; }
  .result-details .pname {
    font-weight: 600;
    font-size: 1rem;
  }
  .result-details .words {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: 0.4rem;
  }
  .result-details .words span {
    font-size: 0.75rem;
    background: var(--surface);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    color: var(--text-muted);
  }
  .result-score {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--dark);
  }

  .hidden { display: none !important; }

  .toast {
    position: fixed;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark);
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 500;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    z-index: 500;
    transition: opacity 0.5s;
  }
  .loading-overlay h2 { font-size: 1.5rem; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--terracotta);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .settings-group {
    margin-bottom: 1.25rem;
  }
  .settings-group label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 500;
    display: block;
    margin-bottom: 0.5rem;
  }
  .option-pills {
    display: flex;
    gap: 0.5rem;
  }
  .option-pill {
    flex: 1;
    padding: 0.5rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .option-pill.active {
    border-color: var(--terracotta);
    background: rgba(196,82,42,0.08);
    color: var(--terracotta);
  }
  .settings-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.25rem 0;
  }

</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">
    <h1>Bo<span>ggle</span></h1>
  </div>

  <div class="lobby-card">
    <h2>Crear nueva sala</h2>
    <div id="dict-status" style="display:flex; align-items:center; gap:0.5rem; font-size:0.78rem; color:var(--text-muted); margin-bottom:0.75rem;">
      <span id="dict-dot" style="width:8px; height:8px; border-radius:50%; background:var(--border); flex-shrink:0; transition: background 0.3s;"></span>
      <span id="dict-msg">Cargando diccionario...</span>
    </div>
    <div class="input-group">
      <label>Tu nombre</label>
      <input id="create-name" type="text" placeholder="¿Cómo te llamas?" maxlength="20">
    </div>

    <hr class="settings-divider">

    <div class="settings-group">
      <label>⏱ Duración del juego</label>
      <div class="option-pills" id="timer-pills">
        <button class="option-pill active" data-val="180" onclick="selectPill('timer-pills', this)">3 min</button>
        <button class="option-pill" data-val="240" onclick="selectPill('timer-pills', this)">4 min</button>
        <button class="option-pill" data-val="300" onclick="selectPill('timer-pills', this)">5 min</button>
      </div>
    </div>

    <div class="settings-group">
      <label>🔤 Longitud mínima de palabra</label>
      <div class="option-pills" id="minword-pills">
        <button class="option-pill active" data-val="3" onclick="selectPill('minword-pills', this)">3 letras</button>
        <button class="option-pill" data-val="4" onclick="selectPill('minword-pills', this)">4 letras</button>
      </div>
    </div>

    <div class="settings-group">
      <label>👁 Puntajes durante el juego</label>
      <div class="option-pills" id="scores-pills">
        <button class="option-pill active" data-val="all" onclick="selectPill('scores-pills', this)">Todos</button>
        <button class="option-pill" data-val="own" onclick="selectPill('scores-pills', this)">Solo el mío</button>
      </div>
    </div>

    <hr class="settings-divider">

    <button class="btn btn-primary" id="create-room-btn" onclick="createRoom()">Crear sala →</button>

    <div class="divider">o únete a una sala existente</div>

    <div class="input-group">
      <label>Tu nombre</label>
      <input id="join-name" type="text" placeholder="¿Cómo te llamas?" maxlength="20">
      <label>Código de sala</label>
      <input id="join-code" type="text" placeholder="ABCD" maxlength="4" style="text-transform:uppercase; font-size:1.3rem; letter-spacing:4px; text-align:center;">
    </div>
    <button class="btn btn-secondary" id="join-room-btn" onclick="joinRoom()">Unirse a sala</button>
  </div>
</div>

<!-- WAITING ROOM -->
<div id="waiting">
  <div class="room-code-display">
    <p>Código de sala</p>
    <div class="code" id="room-code-show">----</div>
    <p style="font-size:0.8rem; color: var(--text-muted); margin-top:0.5rem;">Comparte este código con tus amigos</p>
  </div>

  <div class="players-list">
    <h3>Jugadores en la sala</h3>
    <div id="waiting-players"></div>
  </div>

  <button class="btn btn-primary" id="start-btn" onclick="startGame()" style="max-width:380px; display:none;">
    Comenzar juego ▶
  </button>
  <p id="waiting-msg" style="color: var(--text-muted); font-size:0.9rem;">Esperando al anfitrión para comenzar...</p>
</div>

<!-- GAME -->
<div id="game">
  <div class="game-header">
    <div class="timer-display" id="timer">3:00</div>
    <div class="round-info">
      <div class="round-num">En juego</div>
      <div class="word-count-display" id="word-count-display"></div>
      <button class="btn-restart" onclick="restartGame()" title="Nueva partida">↺</button>
    </div>
    <div class="scores-mini" id="scores-mini"></div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <div class="word-area">
    <div class="current-word" id="current-word">—</div>
    <div class="word-feedback" id="word-feedback"></div>
    <div class="word-actions">
      <button class="btn btn-primary" onclick="submitWord()">Enviar</button>
      <button class="btn btn-secondary" onclick="clearWord()">Limpiar</button>
    </div>
    <div class="found-words" id="found-words"></div>
  </div>
</div>

<!-- RESULTS -->
<div id="results">
  <div class="results-title">
    <p style="font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; color: var(--text-muted);">Fin del juego</p>
    <h2 id="results-headline">¡Ganador!</h2>
  </div>
  <div class="results-card">
    <div id="results-list"></div>
  </div>
  <div style="display:flex; flex-direction:column; gap:0.75rem; width:100%; max-width:380px;">
    <button class="btn btn-primary" id="play-again-btn" onclick="playAgain()" style="display:none;">
      Jugar otra vez (misma sala) ↺
    </button>
    <button class="btn btn-secondary" onclick="backToLobby()">Salir de la sala</button>
  </div>
</div>

<script>

const FIREBASE_CONFIG = {

const API_URL = 'https://boggle-grid.onrender.com';

// ========================
// SPANISH BOGGLE LETTERS (frequency-weighted for Spanish)
// ========================
const DICE = [
  ['A','A','E','I','O','T'],
  ['A','B','L','N','O','R'],
  ['A','C','D','E','L','M'],
  ['A','E','E','G','N','S'],
  ['A','E','I','O','U','N'],
  ['A','E','R','T','U','V'],
  ['B','D','E','H','L','O'],
  ['C','E','I','L','N','R'],
  ['C','H','O','P','Q','U'],
  ['D','E','E','R','S','T'],
  ['E','I','L','O','R','U'],
  ['E','M','N','R','S','T'],
  ['E','P','R','S','T','U'],
  ['F','G','J','O','R','V'],
  ['G','I','L','N','O','S'],
  ['H','I','N','P','Q','U'],

// ========================
// SPANISH WORD DICTIONARY (common 3+ letter words)
// This is a curated list; for production use a full diccionario API
// ========================
// DICT is loaded async from words.txt — see loadDictionary() below
let DICT = new Set();
let dictReady = false;

async function loadDictionary() {
  try {
    const res = await fetch('words.txt');
    if (!res.ok) throw new Error('No se pudo cargar el diccionario');
    const text = await res.text();
    DICT = new Set(text.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length >= 3));
    dictReady = true;
    console.log(`Diccionario cargado: ${DICT.size} palabras`);
    setDictStatus('ok', `Diccionario listo — ${DICT.size.toLocaleString()} palabras`);
  } catch (e) {
    console.warn('words.txt no encontrado, usando diccionario básico incorporado');
    DICT = new Set(FALLBACK_WORDS);
    dictReady = true;
    setDictStatus('ok', `Diccionario listo — ${DICT.size.toLocaleString()} palabras`);
  }
}

function setDictStatus(state, msg) {
  const dot = document.getElementById('dict-dot');
  const txt = document.getElementById('dict-msg');
  if (!dot || !txt) return;
  txt.textContent = msg;
  if (state === 'ok') {
    dot.style.background = 'var(--green-light)';
    txt.style.color = 'var(--green)';
  } else {
    dot.style.background = '#ccc';
    txt.style.color = 'var(--text-muted)';
  }
}

let db, roomRef, playerId, playerName, roomCode, isHost;
let gameSettings = { timerLength: 180, minWordLength: 3, showAllScores: true };
let board = [], selectedCells = [], foundWords = [], scores = {};
let boardValidWords = null;
let boardWordCount = null;
let currentGameStartedAt = null;

// ========================
// FIREBASE SETUP
// ========================
function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    return true;
  } catch(e) {
    // Demo mode if Firebase not configured
    console.warn('Firebase not configured, running in demo mode');
    return false;
  }
}

// ========================
// ROOM MANAGEMENT
// ========================
function genCode() {
  return Math.random().toString(36).substring(2,6).toUpperCase().replace(/[0O1I]/g,'X');
}

function genPlayerId() {
  return 'p_' + Math.random().toString(36).substring(2,10);
}

async function createRoom() {
  const name = document.getElementById('create-name').value.trim();
  if (!name) { showToast('Escribe tu nombre'); return; }

  // Read selected settings
  gameSettings.timerLength    = parseInt(document.querySelector('#timer-pills .option-pill.active').dataset.val);
  gameSettings.minWordLength  = parseInt(document.querySelector('#minword-pills .option-pill.active').dataset.val);
  gameSettings.showAllScores  = document.querySelector('#scores-pills .option-pill.active').dataset.val === 'all';

  playerName = name;
  playerId = genPlayerId();
  isHost = true;
  roomCode = genCode();

  if (!db) { startDemoMode(); return; }

  roomRef = db.ref('rooms/' + roomCode);
  await roomRef.set({
    host: playerId,
    status: 'waiting',
    settings: gameSettings,
    players: { [playerId]: { name, score: 0, words: [] } },
    board: null,
    startedAt: null
  });

  showWaiting();
  listenRoom();
}

async function joinRoom() {
  const name = document.getElementById('join-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!name) { showToast('Escribe tu nombre'); return; }
  if (!code || code.length < 4) { showToast('Ingresa el código de sala'); return; }

  if (!db) { showToast('Firebase no configurado. Usa el modo demo.'); return; }

  playerName = name;
  playerId = genPlayerId();
  isHost = false;
  roomCode = code;
  roomRef = db.ref('rooms/' + code);

  const snap = await roomRef.once('value');
  if (!snap.exists()) { showToast('Sala no encontrada'); return; }
  
  const data = snap.val();
  if (data.status !== 'waiting') { showToast('El juego ya comenzó'); return; }

  await roomRef.child('players/' + playerId).set({ name, score: 0, words: [] });

  showWaiting();
  listenRoom();
}

function listenRoom() {
  roomRef.on('value', snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    const players = data.players || {};

    updateWaitingPlayers(players, data.host);

    if (data.status === 'playing') {
      const newGame = !gameActive || (data.startedAt && data.startedAt !== currentGameStartedAt);
      if (newGame) {
        currentGameStartedAt = data.startedAt;
        board = data.board;
        boardValidWords = data.validWords ? new Set(data.validWords) : null;
        boardWordCount = data.wordCount || null;
        if (data.settings) gameSettings = data.settings;
        scores = {};
        Object.entries(players).forEach(([id, p]) => scores[id] = { name: p.name, score: 0 });
        clearInterval(timerInterval);
        gameActive = false; // force reset before startGameLocal sets it true
        document.getElementById('results').style.display = 'none';
        startGameLocal();
      }
    }

    if (data.status === 'finished') {
      showResults(data);
    }

    if (gameActive && data.players) {
      updateScoresMini(data.players);
    }
  });
}

function showWaiting() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('waiting').style.display = 'flex';
  document.getElementById('room-code-show').textContent = roomCode;
  if (isHost) {
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('waiting-msg').style.display = 'none';
  }
}

function updateWaitingPlayers(players, hostId) {
  const el = document.getElementById('waiting-players');
  el.innerHTML = '';
  Object.entries(players).forEach(([id, p], i) => {
    const isThisHost = id === hostId;
    el.innerHTML += `
      <div class="player-item">
        <div class="player-avatar" style="background:${COLORS[i % COLORS.length]}">${p.name[0].toUpperCase()}</div>
        <span style="font-weight:500">${p.name}</span>
        <span class="status-badge ${isThisHost ? 'status-host' : 'status-ready'}">${isThisHost ? 'Anfitrión' : 'Listo'}</span>
      </div>`;
  });
}

// ========================
// BOARD GENERATION
// ========================

// Fallback local board generator (used if API is not configured)
function generateBoardLocal() {
  const shuffled = [...DICE].sort(() => Math.random() - 0.5);
  return shuffled.map(die => die[Math.floor(Math.random() * die.length)]);
}

// Fetch board + valid words from Python API
async function fetchBoardFromAPI(minLength) {
  if (API_URL === 'YOUR_API_URL') return null; // not configured
  try {
    const res = await fetch(`${API_URL}/generate?min_length=${minLength}`, { method: 'POST' });
    if (!res.ok) throw new Error('API error');
    return await res.json(); // { board, valid_words, word_count }
  } catch (e) {
    console.warn('API unreachable, falling back to local board generation', e);
    return null;
  }
}

async function startGame() {
  if (!isHost) return;
  showToast('Generando tablero...');
  const apiResult = await fetchBoardFromAPI(gameSettings.minWordLength);
  if (apiResult) {
    await roomRef.update({
      board: apiResult.board,
      validWords: apiResult.valid_words,
      wordCount: apiResult.valid_words.length,
      status: 'playing',
      startedAt: Date.now()
    });
  } else {
    await roomRef.update({ board: generateBoardLocal(), validWords: null, wordCount: null, status: 'playing', startedAt: Date.now() });
  }
}

async function restartGame() {
  clearInterval(timerInterval);
  showToast('Generando tablero...');
  const apiResult = await fetchBoardFromAPI(gameSettings.minWordLength);
  if (roomRef) {
    const snap = await roomRef.once('value');
    const players = snap.val().players || {};
    const resetPlayers = {};
    Object.entries(players).forEach(([id, p]) => {
      resetPlayers[id] = { ...p, score: 0, words: [] };
    });
    const newBoard = apiResult ? apiResult.board : generateBoardLocal();
    await roomRef.update({
      board: newBoard,
      validWords: apiResult ? apiResult.valid_words : null,
      wordCount: apiResult ? apiResult.valid_words.length : null,
      status: 'playing',
      startedAt: Date.now(),
      players: resetPlayers,
      settings: gameSettings
    });
  } else {
    // Demo mode
    board = apiResult ? apiResult.board : generateBoardLocal();
    boardValidWords = apiResult ? new Set(apiResult.valid_words) : null;
    boardWordCount = apiResult ? apiResult.valid_words.length : null;
    currentGameStartedAt = Date.now();
    startGameLocal();
  }
}

function selectPill(groupId, el) {
  document.querySelectorAll(`#${groupId} .option-pill`).forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}

// ========================
// GAME LOCAL STATE
// ========================
function startGameLocal() {
  gameActive = true;
  foundWords = [];
  selectedCells = [];
  document.getElementById('found-words').innerHTML = '';
  document.getElementById('word-feedback').textContent = '';
  document.getElementById('current-word').textContent = '—';
  document.getElementById('word-count-display').textContent =
    boardWordCount !== null ? `${boardWordCount} palabras posibles` : '';

  document.getElementById('waiting').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.querySelector('.btn-restart').style.display = isHost ? 'block' : 'none';

  renderBoard();
  startTimer(gameSettings.timerLength);
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  board.forEach((letter, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.idx = i;
    tile.innerHTML = `<span class="letter">${letter}</span><span class="points">${LETTER_POINTS[letter] || 1}</span>`;
    boardEl.appendChild(tile);
  });

  // Attach drag/touch/mouse events to the board container
  boardEl.addEventListener('mousedown',  onDragStart, {passive: false});
  boardEl.addEventListener('touchstart', onDragStart, {passive: false});
  boardEl.addEventListener('mousemove',  onDragMove,  {passive: false});
  boardEl.addEventListener('touchmove',  onDragMove,  {passive: false});
  boardEl.addEventListener('mouseup',    onDragEnd,   {passive: false});
  boardEl.addEventListener('touchend',   onDragEnd,   {passive: false});
  boardEl.addEventListener('mouseleave', onDragEnd,   {passive: false});
}

let isDragging = false;
let dragMoved = false;      // true if finger/mouse moved enough to count as a drag
let dragStartIdx = null;    // tile touched at start

function getTileFromPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  if (!el) return null;
  const tile = el.closest('.tile');
  if (!tile) return null;
  return parseInt(tile.dataset.idx);
}

function onDragStart(e) {
  if (!gameActive) return;
  e.preventDefault();
  isDragging = true;
  dragMoved = false;
  const {x, y} = getCoords(e);
  dragStartIdx = getTileFromPoint(x, y);
}

function onDragMove(e) {
  if (!isDragging || !gameActive) return;
  e.preventDefault();
  const {x, y} = getCoords(e);
  const idx = getTileFromPoint(x, y);
  if (idx === null) return;

  // First movement — start building the drag path from the start tile
  if (!dragMoved) {
    if (idx === dragStartIdx) return; // hasn't moved off the start tile yet
    dragMoved = true;
    clearWord();
    if (dragStartIdx !== null) selectTile(dragStartIdx);
  }

  if (!selectedCells.includes(idx)) {
    if (selectedCells.length === 0 || isAdjacent(selectedCells[selectedCells.length - 1], idx)) {
      selectedCells.push(idx);
      updateTileStyles();
      updateCurrentWord();
    }
  }
}

function onDragEnd(e) {
  if (!isDragging) return;
  isDragging = false;

  if (!dragMoved) {
    // It was a tap — toggle the tile
    const idx = dragStartIdx;
    if (idx === null) return;
    if (selectedCells.length > 0 && selectedCells[selectedCells.length - 1] === idx) {
      // Tap last tile again = deselect it
      selectedCells.pop();
      updateTileStyles();
      updateCurrentWord();
    } else {
      selectTile(idx);
    }
  } else {
    // It was a drag — auto-submit if 3+ letters
    if (selectedCells.length >= 3) {
      submitWord();
    } else {
      clearWord();
    }
  }
  dragStartIdx = null;
}

function getCoords(e) {
  if (e.touches && e.touches.length > 0) {
    return {x: e.touches[0].clientX, y: e.touches[0].clientY};
  }
  if (e.changedTouches && e.changedTouches.length > 0) {
    return {x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY};
  }
  return {x: e.clientX, y: e.clientY};
}

function selectTile(idx) {
  if (!gameActive) return;
  if (selectedCells.includes(idx)) return;
  if (selectedCells.length > 0 && !isAdjacent(selectedCells[selectedCells.length - 1], idx)) return;
  selectedCells.push(idx);
  updateTileStyles();
  updateCurrentWord();
}

function isAdjacent(a, b) {
  const ar = Math.floor(a / 4), ac = a % 4;
  const br = Math.floor(b / 4), bc = b % 4;
  return Math.abs(ar - br) <= 1 && Math.abs(ac - bc) <= 1;
}

function updateTileStyles() {
  document.querySelectorAll('.tile').forEach((t, i) => {
    t.classList.remove('selected', 'path');
    if (selectedCells.includes(i)) {
      if (i === selectedCells[selectedCells.length - 1]) t.classList.add('selected');
      else t.classList.add('path');
    }
  });
}

function updateCurrentWord() {
  const word = selectedCells.map(i => board[i]).join('');
  document.getElementById('current-word').textContent = word || '—';
  document.getElementById('word-feedback').textContent = '';
}

function clearWord() {
  selectedCells = [];
  updateTileStyles();
  updateCurrentWord();
}

function submitWord() {
  const word = selectedCells.map(i => board[i]).join('').toLowerCase();
  const fb = document.getElementById('word-feedback');

  if (!dictReady) { fb.textContent = 'Cargando diccionario...'; fb.className = 'word-feedback err'; return; }
  if (word.length < gameSettings.minWordLength) { fb.textContent = `Mínimo ${gameSettings.minWordLength} letras`; fb.className = 'word-feedback err'; return; }
  if (foundWords.includes(word)) { fb.textContent = 'Ya encontraste esa palabra'; fb.className = 'word-feedback err'; clearWord(); return; }

  const isValid = boardValidWords
    ? boardValidWords.has(word.toUpperCase())
    : DICT.has(word);

  if (isValid) {
    const pts = calcPoints(word);
    foundWords.push(word);
    addWordTag(word, true);
    fb.textContent = `✓ +${pts} puntos`;
    fb.className = 'word-feedback ok';
    saveWordToFirebase(word, pts);
  } else {
    addWordTag(word, false);
    fb.textContent = '✗ Palabra no válida';
    fb.className = 'word-feedback err';
  }
  clearWord();
}

function calcPoints(word) {
  const len = word.length;
  if (len === 3) return 1;
  if (len === 4) return 1;
  if (len === 5) return 2;
  if (len === 6) return 3;
  if (len === 7) return 5;
  return 11;
}

function addWordTag(word, valid) {
  const tag = document.createElement('span');
  tag.className = `word-tag ${valid ? 'valid' : 'invalid'}`;
  tag.textContent = word;
  document.getElementById('found-words').prepend(tag);
}

async function saveWordToFirebase(word, pts) {
  if (!roomRef || !playerId) return;
  const playerRef = roomRef.child('players/' + playerId);
  const snap = await playerRef.once('value');
  const current = snap.val();
  const newScore = (current.score || 0) + pts;
  const newWords = [...(current.words || []), word];
  await playerRef.update({ score: newScore, words: newWords });
}

// ========================
// TIMER
// ========================
function startTimer(seconds) {
  let remaining = seconds;
  const timerEl = document.getElementById('timer');

  function tick() {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (remaining <= 30) timerEl.classList.add('urgent');
    else timerEl.classList.remove('urgent');

    if (remaining <= 0) {
      clearInterval(timerInterval);
      endGame();
    } else {
      remaining--;
    }
  }

  tick();
  timerInterval = setInterval(tick, 1000);
}

async function endGame() {
  gameActive = false;
  if (isHost && roomRef) {
    await roomRef.update({ status: 'finished' });
  } else if (!roomRef) {
    // Demo mode
    showResultsDemo();
  }
}

// ========================
// SCORES
// ========================
function updateScoresMini(players) {
  const el = document.getElementById('scores-mini');
  el.innerHTML = '';
  const entries = Object.entries(players);
  const visible = gameSettings.showAllScores
    ? entries
    : entries.filter(([id]) => id === playerId);
  visible.slice(0, 3).forEach(([id, p], i) => {
    const colorIdx = entries.findIndex(([eid]) => eid === id);
    el.innerHTML += `
      <div class="score-chip">
        <div class="name">${p.name}</div>
        <div class="pts" style="color:${COLORS[colorIdx % COLORS.length]}">${p.score || 0}</div>
      </div>`;
  });
}

// ========================
// RESULTS
// ========================
function showResults(data) {
  document.getElementById('game').style.display = 'none';
  document.getElementById('results').style.display = 'flex';
  clearInterval(timerInterval);
  gameActive = false;

  // Show "play again" button only for the host
  document.getElementById('play-again-btn').style.display = isHost ? 'block' : 'none';

  const players = data.players || {};
  const sorted = Object.entries(players).sort((a, b) => (b[1].score || 0) - (a[1].score || 0));

  if (sorted.length > 0) {
    document.getElementById('results-headline').innerHTML =
      `¡<span class="winner-name">${sorted[0][1].name}</span> gana!`;
  }

  const list = document.getElementById('results-list');
  list.innerHTML = '';
  sorted.forEach(([id, p], i) => {
    const words = (p.words || []).join(', ') || '—';
    list.innerHTML += `
      <div class="player-result">
        <div class="result-rank ${i === 0 ? 'first' : ''}">${i + 1}</div>
        <div class="result-details">
          <div class="pname">${p.name}</div>
          <div class="words"><span>${words}</span></div>
        </div>
        <div class="result-score" style="color:${COLORS[i]}">${p.score || 0}</div>
      </div>`;
  });
}

async function playAgain() {
  // Reuse the same room — just generate a new board and reset to playing
  document.getElementById('play-again-btn').disabled = true;
  document.getElementById('play-again-btn').textContent = 'Generando tablero...';
  await restartGame();
  document.getElementById('results').style.display = 'none';
  document.getElementById('play-again-btn').disabled = false;
  document.getElementById('play-again-btn').textContent = 'Jugar otra vez (misma sala) ↺';
}

function showResultsDemo() {
  const demoData = {
    players: {
      [playerId]: { name: playerName, score: foundWords.reduce((acc, w) => acc + calcPoints(w), 0), words: foundWords }
    }
  };
  showResults(demoData);
}

function backToLobby() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('lobby').style.display = 'flex';
  gameActive = false;
  foundWords = [];
  selectedCells = [];
  if (roomRef) roomRef.off();
}

// ========================
// DEMO MODE (no Firebase)
// ========================
async function startDemoMode() {
  playerName = document.getElementById('create-name').value.trim() || 'Jugador';
  playerId = genPlayerId();
  isHost = true;
  roomCode = 'DEMO';
  gameSettings.timerLength   = parseInt(document.querySelector('#timer-pills .option-pill.active').dataset.val);
  gameSettings.minWordLength = parseInt(document.querySelector('#minword-pills .option-pill.active').dataset.val);
  gameSettings.showAllScores = document.querySelector('#scores-pills .option-pill.active').dataset.val === 'all';
  document.getElementById('lobby').style.display = 'none';
  showToast('Generando tablero...');
  const apiResult = await fetchBoardFromAPI(gameSettings.minWordLength);
  if (apiResult) {
    board = apiResult.board;
    boardValidWords = new Set(apiResult.valid_words);
    boardWordCount = apiResult.valid_words.length;
  } else {
    board = generateBoardLocal();
    boardValidWords = null;
    boardWordCount = null;
  }
  currentGameStartedAt = Date.now();
  startGameLocal();
  showToast('Modo demo (1 jugador)');
}

// ========================
// HELPERS
// ========================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ========================
// KEYBOARD SUPPORT
// ========================
document.addEventListener('keydown', e => {
  if (!gameActive) return;
  if (e.key === 'Enter') submitWord();
  if (e.key === 'Escape') clearWord();
});

// ========================
// INIT
// ========================
loadDictionary(); // start fetching words.txt immediately in background
initFirebase();

// Check if running without config - offer demo
if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
  const createBtn = document.getElementById('create-room-btn');
  const joinBtn = document.getElementById('join-room-btn');
  if (createBtn) {
    createBtn.textContent = 'Demo (1 jugador) →';
    createBtn.onclick = startDemoMode;
  }
  if (joinBtn) {
    joinBtn.onclick = () => showToast('Configura Firebase para jugar con amigos');
  }

  const note = document.createElement('p');
  note.style.cssText = 'font-size:0.78rem; color: var(--text-muted); text-align:center; max-width:380px; line-height:1.5; margin-top:-1rem;';
  note.textContent = 'Para multijugador, configura Firebase (instrucciones en el código)';
  document.getElementById('lobby').appendChild(note);
}
